steps:
  # Step 1: YAML syntax validation
  - name: 'python:3.12-slim'
    id: 'yaml-validate'
    entrypoint: 'bash'
    args:
      - -c
      - |
        pip install -q pyyaml
        python -c "
        import yaml, sys, glob
        errors = []
        for f in glob.glob('jobs/**/*.yaml', recursive=True):
            try:
                with open(f) as fh:
                    list(yaml.safe_load_all(fh))
                print(f'OK: {f}')
            except yaml.YAMLError as e:
                errors.append(f'{f}: {e}')
                print(f'ERROR: {f}: {e}')
        if errors:
            sys.exit(1)
        print('All YAML files are valid.')
        "

  # Step 2: Resource quota check (prevent excessive TPU requests)
  - name: 'python:3.12-slim'
    id: 'quota-check'
    entrypoint: 'bash'
    args:
      - -c
      - |
        pip install -q pyyaml
        python infra/cloudbuild/check_quota.py

  # Step 3: Dry-run validation against GKE cluster
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'dry-run'
    entrypoint: 'bash'
    args:
      - -c
      - |
        echo "Running kubectl dry-run validation..."
        for f in $(find jobs/ -name '*.yaml' -type f); do
          echo "Validating: $f"
          kubectl apply --dry-run=server -f "$f" 2>&1 || true
        done
    env:
      - 'CLOUDSDK_COMPUTE_REGION=us-central1'
      - 'CLOUDSDK_CONTAINER_CLUSTER=shun-elm-poc-gke'

options:
  logging: CLOUD_LOGGING_ONLY
